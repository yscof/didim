name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Analyze
        run: flutter analyze
        working-directory: frontend

      - name: Test
        run: flutter test
        working-directory: frontend

      - name: Build web
        run: flutter build web --release --base-href /didim/
        working-directory: frontend

      # SPA 라우팅: 하위 경로 새로고침 시 404 대신 앱을 서빙
      - name: SPA fallback
        run: cp frontend/build/web/index.html frontend/build/web/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
