version: 0.1.0
updatedAt: 2026-07-07
statusOptions:
  - planned
  - executed
  - held
holdReasonOptions:
  - time_not_enough
  - app_or_page_hard_to_find
  - term_was_confusing
  - worried_about_money
  - need_more_information
  - will_do_later
challenges:
  - id: emergency-fund-goal
    title: 비상금 목표 만들기
    shortDescription: 월 필수 생활비를 기준으로 내 비상금 목표를 정한다.
    category: saving
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 8
    requiredItems:
      - 월 필수 생활비
      - 현재 비상금
    expectedOutcome: 목표 비상금과 월 저축 계획
    whyContent: 비상금은 갑작스러운 지출이 생겼을 때 투자나 적금을 깨지 않게 해주는 첫 안전장치다.
    howContent: 월 필수 생활비를 입력하고 목표 개월 수를 선택한 뒤 매월 모을 금액을 정한다.
    cautionContent: 목표 금액은 부담을 주기 위한 숫자가 아니라 현재 위치를 보기 위한 기준이다.
    sourceList: []
    steps:
      - 월 필수 생활비를 입력한다.
      - 목표 개월 수를 선택한다.
      - 현재 모아둔 비상금을 입력한다.
      - 이번 달부터 모을 금액을 정한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: emergencyFundProjection
      inputs:
        - monthlyEssentialExpense
        - targetMonths
        - currentEmergencyFund
        - monthlySavingAmount
    completionCheckQuestions:
      - 목표 비상금 금액을 정했나요?
      - 이번 달 모을 금액을 정했나요?
    reflectionQuestions:
      - 목표 금액을 보고 어떤 느낌이 들었나요?
      - 이번 달에 바로 할 수 있는 가장 작은 행동은 무엇인가요?
    nextChallengeCandidates:
      - payday-auto-transfer-plan

  - id: payday-auto-transfer-plan
    title: 월급날 자동이체 계획 만들기
    shortDescription: 월급일 직후 자동으로 저축될 금액과 날짜를 정한다.
    category: saving
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 10
    requiredItems:
      - 월급일
      - 저축 가능 금액
      - 사용하는 은행 앱
    expectedOutcome: 자동이체 계획 또는 설정 완료
    whyContent: 저축은 의지보다 순서가 중요하다. 월급 직후 먼저 빼두면 남은 돈 안에서 소비하기 쉬워진다.
    howContent: 월급일 다음 날을 기준으로 자동이체 날짜와 금액을 정하고 은행 앱에서 설정한다.
    cautionContent: 첫 금액은 작아도 괜찮다. 실패하지 않을 금액으로 시작하는 것이 중요하다.
    sourceList: []
    steps:
      - 월급일을 선택한다.
      - 자동이체 금액을 정한다.
      - 자동이체 날짜를 정한다.
      - 은행 앱에서 자동이체 메뉴를 찾는다.
      - 설정했거나 설정할 날짜를 기록한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: yearlySavingPrincipal
      inputs:
        - monthlySavingAmount
    completionCheckQuestions:
      - 자동이체 금액과 날짜를 정했나요?
      - 은행 앱에서 설정했거나 설정할 날짜를 정했나요?
    reflectionQuestions:
      - 이 금액을 매달 유지할 수 있을 것 같나요?
      - 부담된다면 얼마로 낮추면 지속 가능할까요?
    nextChallengeCandidates:
      - fixed-expense-cut-one

  - id: fixed-expense-cut-one
    title: 고정지출 한 개 줄이기
    shortDescription: 사용하지 않는 구독이나 고정지출 하나를 찾아 줄인다.
    category: spending
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 12
    requiredItems:
      - 카드 또는 계좌 결제 내역
      - 구독 서비스 목록
    expectedOutcome: 월 절감액과 해지 또는 보류 기록
    whyContent: 소득을 바로 늘리기는 어렵지만 고정지출 하나를 줄이면 매달 같은 효과가 반복된다.
    howContent: 최근 한 달 결제 내역에서 자주 쓰지 않는 구독을 찾고 해지하거나 다음 해지 날짜를 정한다.
    cautionContent: 꼭 해지하지 않아도 된다. 정말 쓰는 서비스인지 확인하는 것만으로도 소비 기준이 생긴다.
    sourceList: []
    steps:
      - 최근 한 달 고정 결제 항목을 확인한다.
      - 사용 빈도가 낮은 항목을 고른다.
      - 월 결제 금액을 입력한다.
      - 해지했거나 해지할 날짜를 정한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: fixedExpenseSavings
      inputs:
        - monthlyCutAmount
    completionCheckQuestions:
      - 줄일 고정지출 하나를 골랐나요?
      - 해지했거나 해지할 날짜를 정했나요?
    reflectionQuestions:
      - 이 지출을 계속 유지했던 이유는 무엇인가요?
      - 절감액을 어디에 옮겨두면 좋을까요?
    nextChallengeCandidates:
      - emergency-fund-goal
      - payday-auto-transfer-plan

  - id: housing-subscription-check
    title: 청약통장 상태 점검하기
    shortDescription: 청약통장 가입 여부와 월 납입 상태를 확인한다.
    category: housing
    assetStage: 청약·연금
    difficulty: easy
    estimatedMinutes: 8
    requiredItems:
      - 은행 앱
      - 청약통장 가입 여부
    expectedOutcome: 청약통장 점검 상태와 보완 행동
    whyContent: 청약통장은 가입 기간과 납입 이력이 중요할 수 있으므로 미리 상태를 확인해두는 것이 좋다.
    howContent: 사용하는 은행 앱이나 청약 관련 메뉴에서 가입 여부, 납입 금액, 납입 날짜를 확인한다.
    cautionContent: 지역, 주택 유형, 제도 변경에 따라 조건이 달라질 수 있으므로 공식 안내를 함께 확인한다.
    sourceList: []
    steps:
      - 청약통장 가입 여부를 확인한다.
      - 월 납입 여부를 확인한다.
      - 납입 금액과 날짜를 기록한다.
      - 보완할 행동을 하나 선택한다.
    completionMethod: executed_or_held
    impactCalculation:
      type: statusCheck
      inputs:
        - hasHousingSubscriptionAccount
        - monthlyPaymentEnabled
    completionCheckQuestions:
      - 청약통장 가입 여부를 확인했나요?
      - 납입 금액과 날짜를 확인했나요?
    reflectionQuestions:
      - 지금 상태에서 가장 먼저 보완할 점은 무엇인가요?
      - 다음 확인 날짜를 언제로 잡을까요?
    nextChallengeCandidates:
      - payday-auto-transfer-plan
      - youth-policy-eligibility-check

  - id: realistic-saving-rate
    title: 현실적인 월 저축률 정하기
    shortDescription: 실수령액과 필수 지출을 기준으로 유지 가능한 저축률을 정한다.
    category: saving
    assetStage: 적금·예금
    difficulty: easy
    estimatedMinutes: 10
    requiredItems:
      - 월 실수령액
      - 필수 고정지출
    expectedOutcome: 월 저축 목표와 연간 누적 원금
    whyContent: 무리한 저축률은 금방 무너질 수 있다. 유지 가능한 비율을 정해야 다음 달에도 계속할 수 있다.
    howContent: 실수령액에서 필수 지출을 뺀 뒤 추천 범위 안에서 이번 달 저축률을 고른다.
    cautionContent: 추천 비율은 정답이 아니라 시작점이다. 생활이 불안해질 정도의 목표는 피한다.
    sourceList: []
    steps:
      - 월 실수령액을 입력한다.
      - 필수 고정지출을 입력한다.
      - 사용 가능한 금액을 확인한다.
      - 이번 달 저축률과 목표 금액을 정한다.
    completionMethod: planned
    impactCalculation:
      type: yearlySavingPrincipal
      inputs:
        - monthlySavingAmount
    completionCheckQuestions:
      - 이번 달 저축률을 정했나요?
      - 월 저축 목표가 생활에 무리 없는 수준인가요?
    reflectionQuestions:
      - 이 목표를 지키기 어려운 순간은 언제일까요?
      - 목표를 지키기 위해 줄일 수 있는 지출은 무엇인가요?
    nextChallengeCandidates:
      - payday-auto-transfer-plan
      - fixed-expense-cut-one

  - id: youth-policy-eligibility-check
    title: 청년 자산 형성 정책 자격 간이 확인하기
    shortDescription: 내가 확인해야 할 청년 자산 형성 정책 하나를 고른다.
    category: policy
    assetStage: 적금·예금
    difficulty: easy
    estimatedMinutes: 12
    requiredItems:
      - 나이대
      - 근로 또는 소득 상태
      - 거주 지역
    expectedOutcome: 확인 대상 정책과 공식 페이지 링크
    whyContent: 청년 정책은 신청 기간과 조건을 놓치기 쉽다. 오늘 확인할 정책 하나만 정해도 다음 행동이 쉬워진다.
    howContent: 나이대, 소득 상태, 거주 지역을 기준으로 확인할 정책 후보를 고르고 공식 페이지에서 세부 조건을 확인한다.
    cautionContent: 정책 조건은 자주 바뀔 수 있으므로 앱의 설명보다 공식 페이지 기준일을 우선한다.
    sourceList: []
    steps:
      - 나이대와 근로 또는 소득 상태를 선택한다.
      - 거주 지역을 선택한다.
      - 확인할 정책 후보 하나를 고른다.
      - 공식 페이지에서 신청 기간과 조건을 확인한다.
      - 다음 확인 날짜를 저장한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: policyCheckStatus
      inputs:
        - selectedPolicy
        - checkedOfficialPage
    completionCheckQuestions:
      - 확인할 정책 하나를 골랐나요?
      - 공식 페이지에서 신청 기간이나 조건을 확인했나요?
    reflectionQuestions:
      - 조건 중 더 확인해야 할 부분은 무엇인가요?
      - 다음 확인 날짜를 언제로 잡을까요?
    nextChallengeCandidates:
      - realistic-saving-rate

