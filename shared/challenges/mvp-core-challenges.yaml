    coachHook: >
      그 물건, 돈 말고 내 시간으로 계산해본 적 있어요?
      "8만원"이 "내 노동 5시간"이 되면 느낌이 달라져요.
    whyContent: >
      가격을 노동 시간으로 바꾸면 소비의 무게가 직관적으로 느껴진다.
      숫자 감각이 아니라 몸의 감각으로 소비를 판단하게 된다.
    howContent: 실수령액과 근로시간으로 내 시급을 계산하고, 물건 가격을 시간으로 환산한다.
    cautionContent: 죄책감을 주려는 계산이 아니다. '이만큼의 시간과 바꿀 가치가 있는가'를 묻는 도구다.
