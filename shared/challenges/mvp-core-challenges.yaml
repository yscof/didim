  - id: mvp-mobile-plan-compare
    sourceCode: M-10
    title: 통신비 비교 + 요금제/알뜰폰 갈아타기
    challengeType: B
    representative: true
    durationLabel: 15분+
    category: fixed_cost
    assetStage: 공통
    difficulty: normal
    estimatedMinutes: 15
    requiredItems:
      - 현재 요금제와 월 납부액
      - 월 데이터 사용량
    expectedOutcome: 내 조건 기준 비교 결과와 예상 절감액
    coachHook: >
      통신비는 한 번 갈아타면 매달 자동으로 아껴지는 돈이에요.
      15분 비교로 1년치 절감액부터 확인해봐요.
    whyContent: >
      통신비는 청년 고정지출 중 협상 여지가 가장 큰 항목이다.
      같은 데이터 조건에서도 요금제·알뜰폰 간 차이가 크다.
    howContent: >
      현재 요금과 데이터 사용량을 확인하고, 통신요금 정보포털에서
      같은 조건의 요금제를 비교한다. 변경 여부는 자율이다.
    cautionContent: >
      약정 위약금, 가족 결합 할인, 멤버십 혜택을 함께 확인한다.
      특정 통신사를 추천하지 않으며 조건 비교만 안내한다.
    sourceList:
      - name: 스마트초이스 (통신요금 정보포털)
        url: https://www.smartchoice.or.kr
    steps:
      - 현재 요금제 이름과 월 납부액을 확인한다.
      - 최근 3개월 월평균 데이터 사용량을 확인한다.
      - 비교 사이트에서 내 조건에 맞는 요금제를 찾는다 (알뜰폰 포함).
      - 가장 조건이 좋은 요금제와 현재 요금의 차이를 기록한다.
      - 갈아탈지 유지할지 결정을 기록한다 (변경은 자율).
    completionMethod: planned_or_executed
    impactCalculation:
      type: fixedExpenseSavings
      gainLabel: annualized
      formula: (현 요금 − 새 요금) x 12
      inputs:
        - currentMonthlyFee
        - candidateMonthlyFee
    completionCheckQuestions:
      - 내 조건으로 요금제를 비교했나요?
      - 갈아탈지 유지할지 정했나요?
    reflectionQuestions:
      - 비교해보니 내 요금은 적정했나요?
      - 갈아타지 않기로 했다면 이유는 무엇인가요?
    nextChallengeCandidates:
      - mvp-deposit-rate-check
      - mvp-subscription-audit-cancel-one
    edgeCases:
      - case: 약정이 많이 남음
        handling: 위약금 확인 안내 후 "약정 종료 알림 예약"으로 보류 처리 (약정 만료 시 재트리거)

  - id: mvp-deposit-rate-check
    sourceCode: M-11
    title: 예·적금 금리 비교 점검
    subtitle: 금융상품한눈에
    challengeType: B
    category: saving
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 10
    requiredItems:
      - 현재 예·적금 금리와 원금 (없으면 예치 예정 금액)
    expectedOutcome: 금리차 x 원금으로 계산한 연 이자 차이
    coachHook: >
      같은 돈을 넣어도 어디 두느냐에 따라 이자가 달라져요.
      공식 비교 사이트에서 10분이면 내 금리가 적정한지 알 수 있어요.
    whyContent: >
      금리 1% 차이는 원금이 커질수록 무시할 수 없는 금액이 된다.
      금융감독원 공시 사이트를 쓰면 광고 없이 전 금융사를 비교할 수 있다.
      예금자보호(1인당 5천만원) 개념도 이 단계에서 함께 익힌다.
    howContent: >
      내 예·적금 금리를 확인하고 금융상품한눈에에서 같은 조건으로 검색해
      상위 금리와의 차이를 계산한다.
    cautionContent: >
      우대금리는 조건 실현 가능성을 따져본다. 중도해지 시 이율이 크게
      낮아지므로 만기까지 유지 가능한 금액인지 확인한다.
    sourceList:
      - name: 금융감독원 금융상품통합비교공시 (금융상품한눈에)
        url: https://finlife.fss.or.kr
    steps:
      - 내 예·적금의 금리와 원금을 확인한다 (없으면 예치 예정 금액 입력).
      - 금융상품한눈에에서 같은 기간·유형으로 검색한다.
      - 상위 금리와 내 금리의 차이를 확인한다.
      - 금리차 x 원금으로 연 이자 차이를 확인한다.
      - 갈아탈지 유지할지 기록한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: rateGapInterest
      gainLabel: annualized
      formula: (상위 금리 − 내 금리) x 원금
      inputs:
        - currentRate
        - topRate
        - principal
    completionCheckQuestions:
      - 공식 비교 사이트에서 금리를 비교했나요?
      - 연 이자 차이를 확인했나요?
    reflectionQuestions:
      - 내 금리는 상위와 얼마나 차이가 났나요?
      - 우대조건 중 실제로 채울 수 있는 것은 무엇이었나요?
    nextChallengeCandidates:
      - mvp-emergency-fund-account-auto-transfer
      - mvp-housing-subscription-open

