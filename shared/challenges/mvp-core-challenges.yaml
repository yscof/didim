        - monthlyWorkHours
        - itemPrice
    completionCheckQuestions:
      - 물건 1개를 노동 시간으로 환산했나요?
    reflectionQuestions:
      - 환산 결과를 보고도 사고 싶나요?
    nextChallengeCandidates:
