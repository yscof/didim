version: 0.1.0
updatedAt: 2026-07-09
basedOn:
  - challenge-library-v1.yaml # 후보 풀 (MVP 코어 16)
  - didim_challenge_spec_tax.md # M-13 상세 스펙 = S2 실행 시나리오 템플릿
description: >
  MVP 코어 16개의 상세 실행 시나리오. 모든 챌린지는 S2 템플릿
  (훅 → 입력/스캔 → 결과 → 첫 행동 1개 → 완료 확인)을 따른다.
  기획 설명은 docs/15-challenge-scenarios.md 참조.

# 확보효과 라벨. realized만 실적 카운터에 합산하고
# estimated·annualized·reserved는 별도 트랙으로 표시한다.
gainLabels:
  discovery: 발견 (금액 아님, 아하 모먼트)
  estimated: 추정 (응답 기반 예상액, 최대 표기 금지)
  annualized: 연 환산 (월 절감·저축액 x 12, 라벨 명시)
  realized: 실발생 (실제 아낀·모은 금액만 실적 합산)

# 유형별 완료 게이트
completionGates:
  A: 앱 안 결과 확인 + 회고 1문
  B: 첫 행동 자가체크 + 회고 게이트
  C: 기간 내 체크인 누적 + 종료 회고

statusOptions:
  - planned
  - executed
  - held
holdReasonOptions:
  - time_not_enough
  - app_or_page_hard_to_find
  - term_was_confusing
  - worried_about_money
  - need_more_information
  - will_do_later

challenges:
  # ── 1단계 · 비상금 ──────────────────────────────

  - id: mvp-disposable-income
    sourceCode: M-1
    title: 월급 하루 생존 테스트
    subtitle: 진짜 가용액 계산
    challengeType: A
    category: emergency_fund
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 7
    requiredItems:
      - 월 실수령액
      - 고정지출 항목별 대략 금액
    expectedOutcome: 진짜 가처분액과 하루 가용액
    coachHook: >
      월급이 들어온 날, 이미 나가기로 정해진 돈을 다 빼면 얼마가 남을까요?
      7분이면 내 '진짜 월급'을 알 수 있어요.
    whyContent: >
      통장에 찍히는 월급과 실제로 쓸 수 있는 돈은 다르다.
      고정지출을 뺀 가처분액을 알아야 저축 목표도 소비 기준도 세울 수 있다.
    howContent: 실수령액을 입력하고 고정지출을 카테고리별로 입력하면 가처분액과 하루 가용액이 계산된다.
    cautionContent: 정확하지 않아도 된다. 대략의 금액으로 시작하고 나중에 고치면 된다.
    sourceList: []
    steps:
      - 월 실수령액을 입력한다.
      - 고정지출을 카테고리별로 입력한다 (주거·통신·구독·교통·보험·대출 상환).
      - 진짜 가처분액을 확인한다.
      - 하루 가용액(가처분액 ÷ 30)을 확인한다.
    completionMethod: executed
    impactCalculation:
      type: disposableIncomeReveal
      gainLabel: discovery
      formula: 실수령액 − 고정지출 합계, 하루 가용액 = 가처분액 ÷ 30
      inputs:
        - monthlyNetIncome
        - fixedExpensesByCategory
    completionCheckQuestions:
      - 내 진짜 가처분액을 확인했나요?
    reflectionQuestions:
      - 예상보다 컸나요, 작았나요?
      - 가장 큰 고정지출은 무엇이었나요?
    nextChallengeCandidates:
      - mvp-emergency-fund-goal
      - mvp-subscription-audit-cancel-one
    coachContextUsed:
      - 온보딩 급여 구간 (있으면 실수령액 미리 채움)

  - id: mvp-emergency-fund-goal
    sourceCode: M-2
    title: 내 비상금 목표 정하기
    challengeType: A
    category: emergency_fund
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 5
    requiredItems:
      - 월 필수 생활비 (M-1 데이터 재사용 가능)
      - 고용 형태
    expectedOutcome: 개인화된 비상금 목표액
    coachHook: >
      비상금은 '많을수록 좋은 돈'이 아니라 '내 상황에 맞는 만큼'이면 되는 돈이에요.
      내 기준을 5분 만에 정해봐요.
    whyContent: >
      비상금 기준은 사람마다 다르다. 수입이 일정하면 짧게, 불규칙하면 길게 잡는 것이
      일반적인 원칙이다. 기준이 있어야 '얼마나 모았는지'가 보인다.
    howContent: 월 필수 생활비에 고용 형태별 추천 개월 수를 곱해 목표액을 정한다.
    cautionContent: 추천 개월 수는 시작점이다. 부담되면 줄여서 시작해도 된다.
    sourceList: []
    steps:
      - 월 필수 생활비를 확인한다 (M-1 완료 시 자동 입력).
      - 고용 형태를 선택한다 (정규직 3개월 / 계약직·프리랜서 6개월 권장).
      - 추천 개월 수를 확인하고 필요하면 조정한다.
      - 목표액을 확정하고 저장한다.
    completionMethod: executed
    impactCalculation:
      type: emergencyFundTarget
      gainLabel: estimated
      formula: 월 필수 생활비 x 목표 개월 수 (고용 형태별 개인화)
      inputs:
        - monthlyEssentialExpense
        - employmentType
        - targetMonths
    completionCheckQuestions:
      - 목표 비상금 금액을 확정했나요?
    reflectionQuestions:
      - 지금 모아둔 돈으로 몇 개월을 버틸 수 있나요?
    nextChallengeCandidates:
      - mvp-emergency-fund-account-auto-transfer
    coachContextUsed:
      - 고용 형태 (온보딩 응답 재사용)

  - id: mvp-emergency-fund-account-auto-transfer
    sourceCode: M-3
    title: 비상금 통장 분리 + 자동이체
    challengeType: B
    representative: true
    category: emergency_fund
    assetStage: 비상금
    difficulty: normal
    estimatedMinutes: 20
    requiredItems:
      - 사용하는 은행 앱
      - 월급일
      - 자동이체 가능 금액
    expectedOutcome: 비상금 전용 통장과 자동이체 설정
    coachHook: >
      비상금이 생활비 통장에 섞여 있으면 반드시 쓰게 돼요.
      오늘 20분으로 '안 보이는 금고'를 만들어봐요.
    whyContent: >
      저축은 의지보다 구조가 중요하다. 통장을 분리하고 월급 직후 자동이체를 걸면
      의지 없이도 비상금이 쌓인다.
    howContent: >
      비상금 전용 통장을 정하고 별명을 붙인 뒤, 월급일 다음 날로
      자동이체를 설정한다.
    cautionContent: >
      첫 금액은 실패하지 않을 수준으로 작게 시작한다.
      특정 은행·상품 추천은 하지 않으며 통장 유형(입출금·파킹형)만 안내한다.
    sourceList: []
    steps:
      - 비상금 전용으로 쓸 통장을 고르거나 새로 만들 은행을 정한다.
      - 통장에 별명을 붙인다 (O-2 온보딩 연계, 예 "3개월 버티는 돈").
      - 자동이체 날짜를 월급일 다음 날로 정한다.
      - 자동이체 금액을 정한다.
      - 은행 앱에서 자동이체를 설정한다.
      - 설정 완료를 자가체크한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: yearlySavingPrincipal
      gainLabel: annualized
      formula: 월 자동이체액 x 12
      inputs:
        - monthlyAutoTransferAmount
    completionCheckQuestions:
      - 비상금 통장을 분리했나요?
      - 자동이체를 설정했나요, 아니면 설정할 날짜를 정했나요?
    reflectionQuestions:
      - 이 금액을 매달 유지할 수 있을 것 같나요?
      - 설정하면서 막힌 부분이 있었나요?
    nextChallengeCandidates:
      - mvp-net-worth-first-calc
      - mvp-deposit-rate-check
    coachContextUsed:
      - 월급일 (온보딩 응답 재사용)
      - M-2 목표액 (달성 예상 기간 표시)

  - id: mvp-net-worth-first-calc
    sourceCode: M-4
    title: 순자산 첫 계산
    challengeType: A
    category: emergency_fund
    assetStage: 비상금
    difficulty: easy
    estimatedMinutes: 10
    requiredItems:
      - 자산 항목별 대략 금액
      - 부채 항목별 대략 금액
    expectedOutcome: 내 순자산 숫자 하나
    coachHook: >
      자산에서 빚을 빼면 지금의 나를 숫자 하나로 볼 수 있어요.
      크든 작든, 출발선을 아는 게 시작이에요.
    whyContent: >
      순자산은 재무 상태의 기준점이다. 한 번 계산해두면 이후 모든 챌린지의
      효과를 '순자산이 얼마나 움직였는지'로 볼 수 있다.
    howContent: 자산과 부채를 항목별로 입력하면 순자산이 계산되고 진단 프로필에 저장된다.
    cautionContent: >
      마이너스여도 정상적인 출발점이다. 남과 비교하는 숫자가 아니라
      나를 추적하는 숫자다.
    sourceList: []
    steps:
      - 자산을 입력한다 (예·적금, 청약, 투자, 전월세 보증금, 페이 잔액).
      - 부채를 입력한다 (학자금, 카드 할부, 마이너스통장, 대출).
      - 순자산을 확인한다.
      - 진단 프로필에 저장한다.
    completionMethod: executed
    impactCalculation:
      type: netWorthReveal
      gainLabel: discovery
      formula: 자산 합계 − 부채 합계
      inputs:
        - assetItems
        - debtItems
    completionCheckQuestions:
      - 순자산 숫자를 확인했나요?
    reflectionQuestions:
      - 이 숫자를 보고 어떤 느낌이 들었나요?
      - 6개월 뒤 이 숫자가 어떻게 변해 있으면 좋겠나요?
    nextChallengeCandidates:
      - mvp-emergency-fund-goal
      - mvp-letter-to-future-self
    notes: 계산 결과는 진단 데이터와 공유한다. 부채가 있으면 확장 exp-student-loan-strategy 후보로 연결.

  # ── 공통 · 소비 습관 ──────────────────────────────

  - id: mvp-subscription-audit-cancel-one
    sourceCode: M-5
    title: 구독 전수조사 + 1개 이상 해지
    challengeType: B
    representative: true
    category: spending_habit
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 10
    requiredItems:
      - 카드·계좌 결제 내역
      - 앱스토어 구독 목록
    expectedOutcome: 내 구독 전체 목록과 해지 1건 이상
    coachHook: >
      한 달에 몇 개 구독료가 나가는지 정확히 알고 계세요?
      10분 전수조사로 안 쓰는 구독 하나만 잘라도 1년치가 돌아와요.
    whyContent: >
      구독은 가장 잊기 쉬운 고정지출이다. 한 번 전수조사하면
      매달 반복되는 절감 효과가 생긴다.
    howContent: >
      카드 내역, 앱스토어 구독 관리, 통신사 부가서비스 세 곳을 확인해
      목록을 만들고 안 쓰는 것을 해지한다.
    cautionContent: >
      전부 쓰고 있다면 해지하지 않아도 완료다.
      총 구독액을 아는 것 자체가 소비 기준이 된다.
    sourceList: []
    steps:
      - 최근 한 달 카드·계좌 내역에서 정기 결제를 찾는다.
      - 앱스토어(구글·애플) 구독 관리 화면을 확인한다.
      - 통신사 부가서비스를 확인한다.
      - 구독 목록을 만들고 최근 한 달 사용 여부를 체크한다.
      - 안 쓰는 구독 1개 이상을 해지하고 금액을 기록한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: fixedExpenseSavings
      gainLabel: annualized
      formula: 해지 구독료 합계 x 12
      inputs:
        - canceledSubscriptionAmounts
    completionCheckQuestions:
      - 구독 전체 목록을 확인했나요?
      - 해지했거나 해지할 구독을 정했나요?
    reflectionQuestions:
      - 잊고 있던 구독이 있었나요?
      - 남긴 구독은 각각 왜 남겼나요?
    nextChallengeCandidates:
      - mvp-mobile-plan-compare
      - mvp-delivery-cut-weekly
    edgeCases:
      - case: 해지할 구독이 없음
        handling: 총 구독액 확인만으로 완료 인정 + "전부 쓰고 있다면 잘 관리하고 있는 것" 칭찬

  - id: mvp-delivery-cut-weekly
    sourceCode: M-6
    title: 배달 줄이기 주간 미션
    challengeType: C
    durationLabel: 주간
    category: spending_habit
    assetStage: 공통
    difficulty: normal
    estimatedMinutes: 5
    requiredItems:
      - 지난주 배달 횟수 (대략)
      - 회당 평균 배달비 (대략)
    expectedOutcome: 이번 주 줄인 횟수만큼의 실발생 절감액
    coachHook: >
      배달을 끊자는 게 아니에요. 지난주보다 한 번만 줄여도
      그만큼이 진짜로 남는 돈이에요.
    whyContent: >
      배달비는 소액이 반복돼 체감이 안 되는 지출이다.
      주간 목표와 일별 체크인으로 반복 지출을 눈에 보이게 만든다.
    howContent: 지난주 기준을 입력하고 이번 주 목표 횟수를 정한 뒤 매일 체크인한다.
    cautionContent: 목표는 0회가 아니다. 지난주보다 1회만 줄여도 성공이다.
    sourceList: []
    steps:
      - 지난주 배달 횟수와 회당 평균 배달비를 입력한다.
      - 이번 주 목표 횟수를 정한다 (지난주 − 1회 이상 권장).
      - 매일 배달 여부를 체크인한다.
      - 주말에 결산 결과를 확인한다.
    completionMethod: checkin_based
    impactCalculation:
      type: weeklyHabitSavings
      gainLabel: realized
      formula: 회당 평균 배달비 x 줄인 횟수
      inputs:
        - avgDeliveryCost
        - lastWeekCount
        - thisWeekCount
    completionCheckQuestions:
      - 이번 주 체크인을 5일 이상 했나요?
    reflectionQuestions:
      - 배달을 시키게 되는 순간은 주로 언제였나요?
      - 다음 주 목표는 몇 회로 할까요?
    nextChallengeCandidates:
      - mvp-no-spend-day
      - mvp-delivery-cut-weekly
    edgeCases:
      - case: 배달을 거의 안 시키는 사용자
        handling: 시작 전 분기 문항으로 확인 후 카페·택시 등 다른 반복 지출 미션 추천

  - id: mvp-no-spend-day
    sourceCode: M-7
    title: 무지출 데이 1회
    challengeType: C
    durationLabel: 하루
    category: spending_habit
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 3
    requiredItems:
      - 실천할 날짜
    expectedOutcome: 하루 지출 0원 경험과 평균 일지출만큼의 절감
    coachHook: >
      딱 하루만 지갑을 닫아봐요. 자동결제는 예외니까
      생각보다 어렵지 않아요.
    whyContent: >
      무지출 데이는 금액보다 '지출을 선택할 수 있다'는 감각을 만드는 훈련이다.
      하루 성공 경험이 소비 통제감의 시작이 된다.
    howContent: 날짜를 정하고 당일 지출 없이 보낸 뒤 체크인한다.
    cautionContent: >
      고정지출 자동결제는 무지출로 인정한다.
      다음 날 보상 소비가 커지지 않게 주의한다.
    sourceList: []
    steps:
      - 무지출 데이 날짜를 정한다 (약속 없는 날 권장).
      - 당일 아침 시작 체크인을 한다.
      - 하루를 지출 없이 보낸다 (자동결제 예외).
      - 하루 끝 결산 체크인을 한다.
    completionMethod: checkin_based
    impactCalculation:
      type: noSpendDaySavings
      gainLabel: realized
      formula: 내 평균 일지출 (M-1 가처분액 ÷ 30 기반)
      inputs:
        - avgDailySpending
    completionCheckQuestions:
      - 오늘 하루 지출 없이 보냈나요?
    reflectionQuestions:
