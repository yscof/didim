      - 지금 사고 싶은 물건을 이름·가격과 함께 위시리스트에 등록한다.
      - 24시간 뒤 알림을 받고 판단을 기록한다 (산다 / 안 산다 / 더 보류).
    completionMethod: checkin_based
    impactCalculation:
