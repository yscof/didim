  - id: mvp-money-scan-policy-benefits
    sourceCode: M-12
    title: 놓치는 돈 스캔
    subtitle: 숨은 지원금·감면 확인
    challengeType: A
    representative: true
    category: tax_policy
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 7
    requiredItems:
      - 자격 문항 응답 (조회·서류 없음)
    expectedOutcome: 해당 가능 항목 리스트와 예상 금액 합산 (찾은 돈)
    coachHook: >
      신청 안 하면 아무도 챙겨주지 않는 돈이 있어요.
      문항 몇 개만 답하면, 내가 놓치고 있을 지원금·감면을 훑어드릴게요.
    whyContent: >
      청년 대상 지원금·감면은 종류가 많고 흩어져 있어 존재 자체를 모르는 경우가
      대부분이다. 자격 문항 응답만으로 후보를 좁혀주면 확인 비용이 크게 줄어든다.
    howContent: >
      나이·고용·소득 구간·주거 문항에 답하면 해당 가능 항목 리스트와
      예상 금액이 나온다. 모든 문항은 '대략'으로 답해도 충분하다.
    cautionContent: >
      결과는 응답 기반 추정이며 최종 자격은 공식 페이지에서 확인해야 한다.
      모든 금액은 예상·추정 라벨을 붙이고 '최대' 표기는 쓰지 않는다.
    sourceList:
      - name: 정부24 보조금24
        url: https://www.gov.kr
      - name: 복지로
        url: https://www.bokjiro.go.kr
      - name: 국세청 (장려금)
        url: https://www.nts.go.kr
    validUntil: 분기별 재검증 (정책 개편 시 즉시)
    sourceUpdatedAt: 2026-07-09
    steps:
      - 자격 문항에 답한다 (나이, 고용 형태, 소득 구간, 주거, 건강보험 자격 등).
      - 해당 가능 항목 리스트를 확인한다 (청년 정책금융, 근로·자녀장려금, 통신비 감면, 국가건강검진 등).
      - 항목별 예상 금액과 합산 '찾은 돈'을 확인한다.
      - 가장 금액이 큰 항목 1개의 다음 행동을 예약한다.
    completionMethod: executed
    impactCalculation:
      type: policyBenefitSum
      gainLabel: estimated
      formula: 해당 항목 예상 금액 합산 ('찾은 돈' 표기)
      inputs:
        - eligibleItems
    completionCheckQuestions:
      - 스캔 결과를 확인했나요?
      - 다음 행동으로 예약할 항목을 골랐나요?
    reflectionQuestions:
      - 처음 알게 된 항목이 있었나요?
    nextChallengeCandidates:
      - mvp-year-end-tax-preview
      - mvp-housing-subscription-open
    edgeCases:
      - case: 해당 항목 0개
        handling: '"지금은 없지만 취업·이사 등 상황이 바뀌면 다시 스캔" 안내 + 상황 변경 시 재스캔 트리거 등록'
    notes: 모(母) 챌린지 구조. 스캔 결과의 항목별로 후속 미션을 발행한다 (M-13 스펙 §7과 동일 패턴).

  - id: mvp-year-end-tax-preview
    sourceCode: M-13
    specRef: didim_challenge_spec_tax.md (tax_prebook_v1)
    title: 13월의 월급 예약하기
    subtitle: 연말정산, 지금 예약하면 더 돌려받아요
    challengeType: B
    category: tax_policy
    assetStage: 공통
    difficulty: normal
    estimatedMinutes: 15
    requiredItems:
      - 자격 문항 응답 (원천징수영수증·홈택스 조회 불필요)
    expectedOutcome: 내 혜택 지도와 이번 주 첫 행동 1개
    coachHook: >
      직장인, 연말정산이 '연말에 하는 것'이 아니라는 거 아세요?
      1월에 서류 내는 건 채점일 뿐이고, 점수는 지금부터 12월까지 쌓여요.
      오늘 7분이면, 내년 2월에 통장에 꽂힐 '13월의 월급'을 미리 키울 수 있어요.
    whyContent: >
      연말정산의 승부는 연중이다. 연금저축 납입·월세 서류·카드 비율은
      12월에 알면 늦다. 환급은 공돈이 아니라 내가 낸 세금을 돌려받는 것이다.
    howContent: >
      문항 6개에 답하면 내 혜택 지도(항목별 예상 금액)가 나온다.
      전부 하려 하지 말고 이번 주에 딱 하나만 실행한다.
      나머지는 후속 미션으로 자동 예약된다.
    cautionContent: >
      모든 금액은 '예상·추정' + 연도 표기. 감면·공제 세부 요건은
      회사·홈택스에서 최종 확인. 합산액은 '최대'가 아닌 응답 기반 추정 중위값.
    sourceList:
      - name: 국세청
        url: https://www.nts.go.kr
      - name: 홈택스 (연말정산 미리보기)
        url: https://hometax.go.kr
    validUntil: 매년 12/31 (세법 개정 시 즉시)
    sourceUpdatedAt: 2026-01-01
    steps:
      - 스캔 문항 6개에 답한다 (고용 형태 / 회사 규모 / 나이 / 주거 / 무주택 여부 / 이미 하는 것).
      - "'지원자님의 환급 지도'를 확인한다 (항목별 예상 금액 + 내년 현금 증가 예상액)."
      - 이번 주 첫 행동 1개를 고른다 (추천 하이라이트, 변경 가능).
      - 실행 가이드(체크리스트 3개 이하 + 공식 링크)를 따라 실행한다.
      - 첫 행동 자가체크와 회고에 답한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: taxBenefitSum
      gainLabel: estimated
      formula: 해당 항목 예상 금액 합산, '내년 2월 현금 증가 예상액(추정)' 표기
      inputs:
        - eligibleTaxItems
    heroItem:
      name: 중소기업 취업자 소득세 감면
      why: 감면율이 크고(소득세 90%) 실행이 가장 쉬우며(신청서 1장) 인지도가 가장 낮다
      effect: 소득세 90% 감면, 연 한도 200만원 x 최대 5년
      firstAction: 국세청 양식 '감면 신청서' 작성 → 회사(인사·경리)에 제출
    benefitItems:
      - name: 중소기업 취업자 소득세 감면
        eligibility: 만 15~34세 + 중소기업 재직 (일부 업종 제외)
        difficulty: 하
      - name: 월세 세액공제
        eligibility: 무주택 + 총급여 8천 이하 + 전입신고
        firstAction: 서류 3종 모으기 (임대차계약서 사본 · 월세 이체내역 · 전입신고 확인)
        difficulty: 하
      - name: 주택청약 소득공제
        eligibility: 무주택 세대주 + 총급여 7천 이하 + 청약통장
        linkedChallenge: mvp-housing-subscription-open
        difficulty: 중
      - name: 연금저축·IRP 세액공제
        eligibility: 소득 있는 누구나
        firstAction: 개념 카드 확인 → 월 부담 계산기 → 계좌 개설은 자율 (상품 비특정)
        difficulty: 중
      - name: 카드 합계금액 비율
        eligibility: 근로소득자 공통
        firstAction: 내 '총급여 25% 라인' 계산 → 하반기 카드 전략 설정
        difficulty: 하
    completionCheckQuestions:
      - 스캔 결과(환급 지도)를 확인했나요?
      - 이번 주 첫 행동 1개를 실행했거나 실행 날짜를 정했나요?
    reflectionQuestions:
      - 가장 아까웠던 건 뭐였어요? (90% 감면 존재 / 월세 환급 / 12월엔 늦다 / 딱히 없음)
    nextChallengeCandidates:
      - mvp-housing-subscription-open
      - mvp-money-scan-policy-benefits
    followupMissions:
      - condition: 월세 해당 & 미실행
        mission: W+1 월세 공제 서류 3종 모으기 (B, 15분)
      - condition: 청약 미보유
        mission: W+1~2 청약통장 만들기 (mvp-housing-subscription-open 연결)
      - condition: 연금저축 관심 표시
        mission: W+2 연금저축 첫 달 설정 (개념+계산기, 가입 자율)
      - condition: 카드 라인 계산만 한 경우
        mission: 월말 '이번 달 25% 라인 체크' (C형 변형)
      - condition: 시즌 트리거
        mission: 10월 말 홈택스 미리보기 채점 / 1월 서류 제출 리마인드 (연 3회 재방문 트리거)
    seasonVariants:
      yearRound: # 3~10월
        frame: 예약 — 지금 심으면 커진다
        tool: 앱 내 간이 계산
      season: # 11~2월
        frame: 채점 + 막차 스퍼트 — 아직 되는 것 / 내년 예약 구분
        tool: 홈택스 연말정산 미리보기 · 간소화 연동 안내
    edgeCases:
      - case: 프리랜서·사업소득자
        handling: 스캔 1번 문항에서 분기 → "5월 종합소득세 버전으로 예약" 후 미션 등록하고 종료 (빈손 방지 멘트)
      - case: 미취업
        handling: '"취업하면 첫 달에 이 챌린지가 다시 찾아온다" 안내 + 상태 변경 시 재트리거 플래그'
      - case: 이미 감면 신청함
        handling: 해당 카드 완료 처리 + 칭찬 ("상위 몇 % 행동")
      - case: 회사 규모 모름
        handling: '확인법 안내 — "급여명세서 회사명으로 중소기업확인서 조회, 또는 인사팀에 ''중기 감면 대상인가요?'' 한 줄 질문" (질문 문구까지 제공)'
    events:
      - scan_completed
      - hero_item_shown
      - hero_item_acted
      - first_action_selected
      - followup_queued
      - season_trigger_return
      - share_card_created

  # ── 공통 · 신용/안전 ──────────────────────────────

  - id: mvp-credit-score-first-check
    sourceCode: M-14
    title: 신용점수 첫 조회 + 올리는 행동 1개
    challengeType: B
    category: credit_safety
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 8
    requiredItems:
      - 본인 인증 가능한 금융·핀테크 앱
    expectedOutcome: 내 신용점수대와 올리는 행동 1개
    coachHook: >
      신용점수, 조회하면 떨어진다고 알고 계셨죠? 아니에요.
      내 점수 확인은 무료고 점수에 영향이 없어요. 8분이면 확인부터 올리는 행동까지 끝나요.
    whyContent: >
      신용점수는 전월세 대출·카드 발급 등 앞으로의 금융 생활 전체에 영향을 준다.
      본인 신용 조회는 점수에 영향이 없다는 것부터가 첫 지식이다.
    howContent: >
      무료 조회 채널에서 점수를 확인하고, 점수를 올리는 행동 중
      지금 할 수 있는 것 1개를 고른다.
    cautionContent: >
      "점수 올려준다"는 유료 서비스는 주의한다. 공식 무료 경로로 충분하다.
      점수대 자가체크만 받고 점수 원본 제출은 요구하지 않는다.
    sourceList:
      - name: NICE평가정보 / KCB (전국민 무료 신용조회)
        url: https://www.credit.co.kr
    steps:
      - 스텝1 개념 카드를 확인한다 ("본인 조회는 점수에 영향 없음").
      - 무료 조회 채널에서 내 신용점수를 조회한다 (은행·핀테크 앱 무료 메뉴 카테고리 안내).
      - 점수대를 자가체크한다.
      - 올리는 행동 1개를 고른다 (통신비·건보료 납부내역 제출, 소액 연체 정리, 카드 대금 자동이체 설정 등).
    completionMethod: planned_or_executed
    impactCalculation:
      type: statusCheck
      gainLabel: discovery
      formula: 발견 (점수대 확인 + 개선 행동 선택)
      inputs:
        - scoreRangeChecked
        - selectedImprovementAction
    completionCheckQuestions:
      - 신용점수를 조회했나요?
      - 올리는 행동 1개를 골랐나요?
    reflectionQuestions:
      - 점수가 예상과 비슷했나요?
      - 고른 행동은 언제 실행할 건가요?
    nextChallengeCandidates:
      - mvp-money-scan-policy-benefits

  # ── 2단계 · 청약·연금 ──────────────────────────────

  - id: mvp-housing-subscription-open
    sourceCode: M-15
    title: 청약통장 만들기
    subtitle: 자격·혜택 확인 후 개설 안내
    challengeType: B
    representative: true
    category: housing_pension
    assetStage: 청약·연금
    difficulty: normal
    estimatedMinutes: 20
    requiredItems:
      - 은행 앱
      - 무주택·세대주 여부
      - 대략의 총급여
    expectedOutcome: 청약통장 개설 (또는 보유자는 상태 점검) + 소득공제 예상액
    coachHook: >
      청약통장은 '집 살 사람'만 만드는 게 아니에요. 무주택 직장인이라면
      납입액의 40%를 소득공제 받는 절세 통장이기도 해요. 20분이면 자격 확인부터 개설까지 끝나요.
    whyContent: >
      청약통장은 가입 기간이 길수록 유리한 경우가 많아 일찍 만드는 것 자체가 자산이다.
      조건이 되면 연말정산 소득공제 혜택도 함께 받는다.
      금융상품 설명서에서 확인할 항목(금리·인정 납입액)도 이 단계에서 익힌다.
    howContent: >
      자격과 혜택을 확인하고 월 납입액을 정한 뒤 은행 앱에서 개설한다.
      이미 있다면 납입 상태 점검으로 진행한다.
    cautionContent: >
      소득공제는 무주택 세대주 + 총급여 7천만원 이하 조건이다.
      지역·제도 변경에 따라 조건이 달라질 수 있으므로 공식 안내를 우선한다.
    sourceList:
      - name: 주택도시기금 (주택청약종합저축)
        url: https://nhuf.molit.go.kr
      - name: 국세청 (주택마련저축 소득공제)
        url: https://www.nts.go.kr
    validUntil: 매년 재검증 (청약 제도·세법 개정 시 즉시)
    sourceUpdatedAt: 2026-07-09
    steps:
      - 청약통장 보유 여부를 확인한다 (보유 시 납입 상태 점검 모드로 전환).
      - 자격·혜택을 확인한다 (무주택 세대주 여부, 총급여, 소득공제 조건).
      - 월 납입액을 정한다 (인정 납입액 기준 안내).
      - 은행 앱에서 주택청약종합저축을 개설한다.
      - 개설 완료를 자가체크하고 회고에 답한다.
    completionMethod: planned_or_executed
    impactCalculation:
      type: housingSavingTaxBenefit
      gainLabel: annualized
      formula: min(연 납입액, 공제 한도) x 40% 소득공제 (해당자 한정, '해당 시' 라벨)
      inputs:
        - yearlyPaymentAmount
        - isEligibleForDeduction
    completionCheckQuestions:
      - 청약통장을 개설했나요, 아니면 개설할 은행과 납입액을 정했나요?
      - 소득공제 대상 여부를 확인했나요?
    reflectionQuestions:
      - 오늘 새롭게 알게 된 점은 무엇인가요?
      - 개설을 막은 가장 큰 장벽은 무엇이었나요?
    nextChallengeCandidates:
      - mvp-year-end-tax-preview
      - mvp-emergency-fund-account-auto-transfer
    edgeCases:
      - case: 이미 보유
        handling: 상태 점검 모드 — 납입 여부·금액 확인 후 보완 행동 1개 선택으로 완료 (기존 housing-subscription-check 흡수)
      - case: 소득공제 비대상
        handling: '"공제는 안 되지만 가입 기간 자체가 자산" 안내로 비참 방지, 개설 여부는 자율'

  # ── 리텐션 ──────────────────────────────

  - id: mvp-letter-to-future-self
    sourceCode: M-16
    title: 1년 뒤 나에게 편지 봉인
    challengeType: A
    category: retention
    assetStage: 리텐션
    difficulty: easy
    estimatedMinutes: 7
    requiredItems:
      - 지금의 재무 상태 스냅샷 (자동 첨부)
    expectedOutcome: 봉인된 편지와 1년 뒤 오픈 알림
    coachHook: >
      1년 뒤의 나는 지금의 나에게 뭐라고 할까요?
      지금 상태를 스냅샷으로 봉인해두면, 1년 뒤에 열어보는 재미가 달라요.
    whyContent: >
      기록은 변화를 보이게 만든다. 1년 전 내 순자산과 다짐을 다시 보는 순간이
      가장 강한 동기부여가 된다.
    howContent: 가이드 질문을 따라 편지를 쓰고 봉인하면 1년 뒤 알림과 함께 열린다.
    cautionContent: 길게 쓰지 않아도 된다. 세 문장이면 충분하다.
    sourceList: []
    steps:
      - 지금 재무 상태 스냅샷을 확인한다 (순자산·목표, M-4 데이터 자동 첨부).
      - 가이드 질문 3개를 따라 편지를 쓴다 (지금 가장 큰 고민 / 1년 뒤 바라는 것 / 나에게 한마디).
      - 편지를 봉인한다.
      - 1년 뒤 오픈 알림이 예약된다.
    completionMethod: executed
    impactCalculation:
      type: retentionTrigger
      gainLabel: discovery
      formula: 1년 뒤 오픈 알림 = 재방문 트리거 (금액 없음)
      inputs: []
    completionCheckQuestions:
      - 편지를 봉인했나요?
    reflectionQuestions:
      - 1년 뒤 이 편지를 여는 나는 어떤 모습이면 좋겠나요?
    nextChallengeCandidates:
      - mvp-net-worth-first-calc
    notes: 순자산(M-4) 완료 직후 추천하면 스냅샷 데이터가 풍부해진다.
