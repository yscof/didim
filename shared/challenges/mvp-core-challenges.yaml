    coachHook: >
      사지 말라는 게 아니에요. 24시간만 기다렸다가 그래도 사고 싶으면 사세요.
      대신 마음이 바뀐 만큼은 전부 아낀 돈이에요.
    whyContent: >
      충동구매의 상당수는 하루만 지나면 사라진다.
      '바로 결제' 대신 '위시리스트 등록'이라는 한 단계를 끼워 넣는 규칙이다.
    howContent: 사고 싶은 물건을 위시리스트에 등록하면 24시간 뒤 알림이 오고, 그때 판단을 기록한다.
    cautionContent: 보류는 금지가 아니다. 24시간 뒤 '산다'를 선택해도 규칙은 지킨 것이다.
