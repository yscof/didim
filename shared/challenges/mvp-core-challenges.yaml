  - id: mvp-labor-hour-price
    sourceCode: M-9
    title: 시급으로 환산해보기
    subtitle: 이 물건 = 내 노동 몇 시간
    challengeType: A
    category: spending_habit
    assetStage: 공통
    difficulty: easy
    estimatedMinutes: 5
    requiredItems:
