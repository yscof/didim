      - 사고 싶은 물건의 가격을 입력한다.
      - '"이 물건 = 내 노동 N시간" 결과를 확인한다.'
      - 원하면 결과 카드를 공유한다.
    completionMethod: executed
    impactCalculation:
      type: laborHourConversion
      gainLabel: discovery
      formula: 물건 가격 ÷ (월 실수령액 ÷ 월 근로시간)
      inputs:
