absorbed:
  - source: 예금과 적금 차이 / 금리 1% 중요성
    absorbedInto: M-11 예적금 비교의 스텝1
  - source: 체크카드 vs 신용카드
    absorbedInto: 카드 점검 챌린지 스텝1
  - source: 신용점수 첫 이해
    absorbedInto: M-14 스텝1
  - source: 예금자보호 구분 / 금융상품 설명서 읽기
    absorbedInto: M-11·M-15 스텝
  - source: 단리/복리, 수익률-손실률 비대칭, ETF vs 주식, 세전/세후
    absorbedInto: 투자 입문 챌린지 스텝1 + SRS 퀴즈
  - source: 위험 대비 수익 관점 / 리밸런싱 개념 / 의사결정 기준
    absorbedInto: 4단계 챌린지 스텝 + SRS
  - source: 금융 용어 약점 찾기 / 금융 레벨 테스트
    absorbedInto: SRS 복습 시스템 + O-1 문항
  - source: 밸런스 게임 / 1만원 상상 게임 / 첫 금융 목표 고르기
    absorbedInto: O-1 온보딩 테스트 문항
  - source: 내 카드 소비 캐릭터 찾기
    absorbedInto: O-1로 승격
  - source: 신용카드 혜택 구조 점검
    absorbedInto: 확장 카드 점검과 통합
  - source: 자산 배분 상태 보기
    absorbedInto: 4단계 진단 기능과 통합
  - source: 투자 강의 수강+요약
    absorbedInto: 자체 스텝 콘텐츠로 대체
    status: held
    reason: 외부 콘텐츠 품질 통제 문제
  - source: 카드 소비 캐릭터
    absorbedInto: O-1 소비 캐릭터 테스트
  - source: 통장 별명 붙이기
    absorbedInto: O-2 내 통장에 이름 붙여주기
  - source: 내 통장은 무슨 역할
    absorbedInto: O-2 내 통장에 이름 붙여주기

isolatedOrExcluded:
  - source: 증권 계좌 개설 + 실제 1주 매수
    status: isolated
    reason: 실매수 유도
    possibleReplacement: 계좌 개설·모의투자까지, 4단계 전용+자율 원칙 필요
  - source: 해외 주식 환전 + 1주 매수
    status: isolated
    reason: 실매수 유도와 환리스크
  - source: 공모주 청약 실제 참여
    status: isolated
    reason: 실투자 유도와 시점성 리스크
  - source: 섹터 ETF 비교 + 유망 산업 선택
    status: isolated
    reason: 전망·추천 유도, 유사투자자문 경계
  - source: 월간 투자 계획 + 투자 자동이체 설정
    status: isolated
    reason: 4단계 도달자 전용, 상품 비특정, 면책 전제로만 검토
  - source: 부자 아침 루틴 조사 + 적용
    status: excluded
    reason: 자기계발 유사과학 톤, 공식 근거 기반 신뢰성 포지션과 충돌
  - source: PER/PBR 판결문 작성 원형
    status: excluded
    reason: 종목 판단 유도 표현
    replacement: exp-financial-ratio-reading
  - source: ETF 1개 선택 원형
    status: excluded
    reason: 선택 유도 표현
    replacement: exp-etf-three-comparison-table

