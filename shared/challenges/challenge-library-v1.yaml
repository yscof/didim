principles:
  - 행동이 없으면 챌린지가 아니다.
  - 실매수와 특정 종목 판단 유도는 격리한다.
  - 중복 행동은 하나의 챌린지로 통합한다.
  - 확보효과는 고정 금액이 아니라 산식으로 계산한다.
  - 학습형 콘텐츠는 스텝1, whyContent, SRS 복습 카드로 흡수한다.
